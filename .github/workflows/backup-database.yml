name: Backup Neon Database

on:
  schedule:
    # Ежедневно 03:00 UTC = 06:00 МСК (раньше других прод-cron'ов CRM, БД свободна)
    - cron: '0 3 * * *'
  workflow_dispatch:  # Ручной запуск из UI

jobs:
  backup:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Install PostgreSQL 18 client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          pg_dump --version

      - name: Set timestamp
        id: timestamp
        run: echo "value=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -e
          mkdir -p backups
          # Custom format (-Fc) — сжатый бинарный, читается через pg_restore.
          # --no-owner и --no-acl — для портабельности между БД с разными ролями.
          pg_dump \
            --format=custom \
            --no-owner \
            --no-acl \
            --verbose \
            --file="backups/budni-${{ steps.timestamp.outputs.value }}.dump" \
            "$DATABASE_URL"
          ls -lah backups/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: budni-backup-${{ steps.timestamp.outputs.value }}
          path: backups/budni-${{ steps.timestamp.outputs.value }}.dump
          retention-days: 30
          compression-level: 0  # Файл уже сжат pg_dump -Fc, повторное сжатие бесполезно

      - name: Telegram alert on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
        run: |
          MESSAGE=$(printf "🚨 <b>Бэкап БД упал</b>\n\nRun: %s\nWorkflow: %s\nCommit: %s\n\nПроверить: https://github.com/%s/actions/runs/%s" \
            "${{ steps.timestamp.outputs.value }}" \
            "${{ github.workflow }}" \
            "${{ github.sha }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MESSAGE}" \
            > /dev/null
